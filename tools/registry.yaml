#       type: string | integer | float | boolean | file_path
#       required: true | false
#       description: what this input is
#   outputs:
#     - name: <output_name>
#       type: string | json | file
#       description: what this output is
#   credentials: [ENV_VAR_1, ENV_VAR_2]  # from .env
#   cost: "$X.XX per run" or "free"
#   composable_with: [other_tool_1, other_tool_2]

