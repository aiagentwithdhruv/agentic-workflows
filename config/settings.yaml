# Global settings for the agentic workflows engine

retry:
  max_attempts: 3
  backoff: exponential       # exponential | linear | fixed
  base_delay_seconds: 2
  max_delay_seconds: 30

cost:
  daily_limit_usd: 10.00
  warn_at_usd: 5.00
  track_per_run: true

logging:
  level: INFO                # DEBUG | INFO | WARNING | ERROR
  format: json
  output: runs/              # run logs go here
  console: true              # also print to stdout

execution:
  timeout_seconds: 300       # per-tool timeout (5 min default)
  parallel_tools: false      # run independent tools in parallel (future)
  tmp_cleanup: false         # auto-delete .tmp/ after workflow completes

deliverables:
  # Where final outputs go (cloud services preferred)
  default: .tmp/             # fallback if no cloud destination specified
  # Override per-workflow:
  # google_sheets: true
  # gmail: true
  # notion: true
